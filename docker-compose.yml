services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: dnzmedya-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: file:/data/dev.db
      RUN_SEED: ${RUN_SEED:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      API_PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/uploads
    volumes:
      - db_data:/data
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: dnzmedya-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3001}
    container_name: dnzmedya-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  db_data:
  uploads_data:
